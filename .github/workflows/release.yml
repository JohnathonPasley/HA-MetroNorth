name: Create Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/metro_north/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --target main \
            --notes "## MTA Metro North ${{ steps.version.outputs.tag }}

          Home Assistant custom integration for real-time MTA Metro North train data.

          ### Installation via HACS
          1. Add this repository as a custom HACS integration
          2. Install **MTA Metro North** and restart Home Assistant
          3. Add via **Settings → Devices & Services → Add Integration**

          ### Features
          - Real-time departure sensors per station (next train, upcoming trains)
          - Train vehicle GPS trackers on the HA map
          - Full stop schedule per train from static GTFS
          - Time-based polling with configurable peak windows
          - No API key required"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
